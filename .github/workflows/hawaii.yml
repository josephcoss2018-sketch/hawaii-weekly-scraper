name: Hawaii Weekly Scraper

on:
  schedule:
    - cron: '0 12 * * 1'   # Every Monday at 12:00 UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python hawaii_weekly_scraper.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: hawaii-candidates-report-${{ github.run_id }}
          path: hawaii_reports/
          retention-days: 90

      - name: Send email with results
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Hawaii 2026 Candidates — Weekly Scrape #${{ github.run_number }}"
          to: joseph.coss2018@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USER }}>
          body: "Attached is the latest Hawaii 2026 Campaign Finance Candidates Excel file from run #${{ github.run_number }}."
          attachments: hawaii_reports/*.xlsx
